<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskBlast – Weekly Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <style>
   body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #1a0533 0%, #0d1b4b 100%);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  box-sizing: border-box;
}
.card {
  width: 100%;
  max-width: 460px;
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(24px);
  border-radius: 28px;
  padding: 36px 32px;
  border: 1px solid rgba(255,255,255,0.1);
  box-sizing: border-box;
}
    .worker-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 10px;
    }
    .badge {
      font-size: 11px;
      padding: 3px 12px;
      border-radius: 999px;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <!-- Header Card -->
  <div class="card">
    <div style="display:inline-flex;align-items:center;gap:6px;color:#fff;font-weight:700;font-size:14px;padding:6px 18px;border-radius:999px;margin-bottom:16px;border:2px solid #ec4899;box-shadow:0 0 12px #ec4899;letter-spacing:2px;text-shadow:0 0 8px #ec4899;">
      ✦ 2026 ✦
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h1 style="font-size:1.6rem;font-weight:800;color:#fff;">
        Task<span style="color:#ec4899;">Blast</span>
        <span style="font-size:1rem;color:rgba(255,255,255,0.4);font-weight:400;"> — Weekly Report</span>
      </h1>
      <div style="display:flex;gap:8px;">
        <a href="./index.html" style="color:#ec4899;font-size:13px;text-decoration:none;border:1px solid #ec4899;padding:6px 14px;border-radius:999px;">← Back</a>
        <button onclick="downloadPDF()" style="color:#c8f400;font-size:13px;background:transparent;border:1px solid #c8f400;padding:6px 14px;border-radius:999px;cursor:pointer;">⬇️ PDF</button>
      </div>
    </div>
    <p id="weekLabel" style="color:rgba(255,255,255,0.4);font-size:13px;margin-top:8px;"></p>
  </div>

  <!-- Stats Card -->
  <div class="card">
    <p style="color:rgba(255,255,255,0.4);font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:16px;">THIS WEEK OVERVIEW</p>
    <div style="display:flex;justify-content:space-around;text-align:center;margin-bottom:24px;">
      <div>
        <div id="totalCount" style="font-size:32px;font-weight:800;color:#fff;">0</div>
        <div style="font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.4);">TOTAL</div>
      </div>
      <div>
        <div id="pendingCount" style="font-size:32px;font-weight:800;color:#ec4899;">0</div>
        <div style="font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.4);">PENDING</div>
      </div>
      <div>
        <div id="progressCount" style="font-size:32px;font-weight:800;color:#f59e0b;">0</div>
        <div style="font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.4);">IN PROGRESS</div>
      </div>
      <div>
        <div id="doneCount" style="font-size:32px;font-weight:800;color:#c8f400;">0</div>
        <div style="font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.4);">DONE</div>
      </div>
    </div>
    <!-- Chart -->
    <canvas id="statusChart" height="120"></canvas>
  </div>

  <!-- Worker Report Card -->
  <div class="card">
    <p style="color:rgba(255,255,255,0.4);font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:16px;">WORKER PERFORMANCE</p>
    <div id="workerList"></div>
  </div>

  <!-- Task List Card -->
  <div class="card">
    <p style="color:rgba(255,255,255,0.4);font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:16px;">ALL TASKS THIS WEEK</p>
    <div id="taskList"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://usuxjrmhwgiefrhimvxw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzdXhqcm1od2dpZWZyaGltdnh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTM2MTcsImV4cCI6MjA5MDUyOTYxN30.MrpVZIWrivWJCNFjIHoaFO4tz2PWLEFP5CI6XlWB7EU';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Check login
    if (!localStorage.getItem('userEmail')) window.location.href = './login.html';

    // Week range
    const now = new Date();
    const dayOfWeek = now.getDay();
    const monday = new Date(now);
    monday.setDate(now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
    monday.setHours(0,0,0,0);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23,59,59,999);

    document.getElementById('weekLabel').textContent =
      `Week: ${monday.toDateString()} — ${sunday.toDateString()}`;

    function getStatusStyle(status) {
      if (status === 'pending')     return 'background:#ec489922;color:#ec4899;';
      if (status === 'in-progress') return 'background:#f59e0b22;color:#f59e0b;';
      if (status === 'done')        return 'background:#c8f40022;color:#c8f400;';
      return '';
    }

    async function loadReport() {
      const { data: tasks, error } = await db
        .from('tasks')
        .select('*')
        .gte('created_at', monday.toISOString())
        .lte('created_at', sunday.toISOString())
        .order('created_at', { ascending: false });

      if (error) { console.error(error); return; }

      // Stats
      const pending    = tasks.filter(t => t.status === 'pending').length;
      const inProgress = tasks.filter(t => t.status === 'in-progress').length;
      const done       = tasks.filter(t => t.status === 'done').length;

      document.getElementById('totalCount').textContent    = tasks.length;
      document.getElementById('pendingCount').textContent  = pending;
      document.getElementById('progressCount').textContent = inProgress;
      document.getElementById('doneCount').textContent     = done;

      // Chart
      new Chart(document.getElementById('statusChart'), {
        type: 'bar',
        data: {
          labels: ['Pending', 'In Progress', 'Done'],
          datasets: [{
            data: [pending, inProgress, done],
            backgroundColor: ['#ec489966', '#f59e0b66', '#c8f40066'],
            borderColor: ['#ec4899', '#f59e0b', '#c8f400'],
            borderWidth: 2,
            borderRadius: 8,
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: 'rgba(255,255,255,0.5)' }, grid: { color: 'rgba(255,255,255,0.05)' } },
            y: { ticks: { color: 'rgba(255,255,255,0.5)', stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.05)' } }
          }
        }
      });

      // Worker Performance
      const workers = {};
      tasks.forEach(t => {
        const w = t.assigned_to || 'Unassigned';
        if (!workers[w]) workers[w] = { total: 0, done: 0, pending: 0, inProgress: 0 };
        workers[w].total++;
        if (t.status === 'done')        workers[w].done++;
        if (t.status === 'pending')     workers[w].pending++;
        if (t.status === 'in-progress') workers[w].inProgress++;
      });

      const workerList = document.getElementById('workerList');
      workerList.innerHTML = '';
      Object.entries(workers).forEach(([name, stats]) => {
        const percent = stats.total > 0 ? Math.round((stats.done / stats.total) * 100) : 0;
        workerList.innerHTML += `
          <div class="worker-row">
            <div>
              <span style="color:#fff;font-weight:700;">👤 ${name}</span>
              <div style="margin-top:6px;display:flex;gap:8px;">
                <span class="badge" style="background:#ec489922;color:#ec4899;">${stats.pending} Pending</span>
                <span class="badge" style="background:#f59e0b22;color:#f59e0b;">${stats.inProgress} In Progress</span>
                <span class="badge" style="background:#c8f40022;color:#c8f400;">${stats.done} Done</span>
              </div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:22px;font-weight:800;color:${percent >= 70 ? '#c8f400' : percent >= 40 ? '#f59e0b' : '#ec4899'};">${percent}%</div>
              <div style="font-size:11px;color:rgba(255,255,255,0.4);">COMPLETE</div>
            </div>
          </div>
        `;
      });

      // Task List
      const taskList = document.getElementById('taskList');
      taskList.innerHTML = '';
      tasks.forEach(t => {
        taskList.innerHTML += `
          <div style="display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.05);border-radius:12px;padding:12px 16px;margin-bottom:8px;">
            <div>
              <span style="color:#fff;display:block;">${t.text}</span>
              <span style="font-size:11px;color:#ec4899;">👤 ${t.assigned_to || 'Unassigned'}</span>
            </div>
            <span style="font-size:11px;padding:3px 12px;border-radius:999px;${getStatusStyle(t.status)}">${t.status}</span>
          </div>
        `;
      });
    }

    

    loadReport();

  function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  // Title
  doc.setFontSize(20);
  doc.setTextColor(236, 72, 153);
  doc.text('TaskBlast — Weekly Report', 14, 20);

  // Week
  doc.setFontSize(10);
  doc.setTextColor(150, 150, 150);
  doc.text(document.getElementById('weekLabel').textContent, 14, 28);

  // Stats
  doc.setFontSize(12);
  doc.setTextColor(0, 0, 0);
  doc.text(`Total: ${document.getElementById('totalCount').textContent}`, 14, 40);
  doc.text(`Pending: ${document.getElementById('pendingCount').textContent}`, 60, 40);
  doc.text(`In Progress: ${document.getElementById('progressCount').textContent}`, 106, 40);
  doc.text(`Done: ${document.getElementById('doneCount').textContent}`, 160, 40);

  // Worker Performance
  doc.setFontSize(13);
  doc.setTextColor(236, 72, 153);
  doc.text('Worker Performance', 14, 55);

  const workerRows = [];
  document.querySelectorAll('.worker-row').forEach(row => {
    try {
     const name = row.querySelector('span')?.textContent?.replace(/[^\x00-\x7F]/g, '').trim() || '';
      const badges  = row.querySelectorAll('.badge');
      const percent = row.querySelector('[style*="font-size:22px"]')?.textContent?.trim() || '0%';
      workerRows.push([
        name,
        badges[0]?.textContent?.trim() || '0 Pending',
        badges[1]?.textContent?.trim() || '0 In Progress',
        badges[2]?.textContent?.trim() || '0 Done',
        percent
      ]);
    } catch(e) {}
  });

  doc.autoTable({
    startY: 60,
    head: [['Worker', 'Pending', 'In Progress', 'Done', 'Complete %']],
    body: workerRows,
    headStyles: { fillColor: [236, 72, 153] },
    alternateRowStyles: { fillColor: [245, 245, 255] },
  });

  // Tasks
  const finalY = doc.lastAutoTable.finalY + 10;
  doc.setFontSize(13);
  doc.setTextColor(236, 72, 153);
  doc.text('All Tasks This Week', 14, finalY);

  const taskRows = [];
  document.querySelectorAll('#taskList > div').forEach(row => {
    try {
      const text   = row.querySelector('span')?.textContent?.trim() || '';
      const workerRaw = row.querySelector('[style*="color:#ec4899"]')?.textContent?.trim() || 'Unassigned';
      const worker = workerRaw.replace(/[^\x00-\x7F]/g, '').trim() || 'Unassigned';
      const status = row.querySelector('[style*="border-radius:999px"]')?.textContent?.trim() || '';
      if (text) taskRows.push([text, worker, status]);
    } catch(e) {}
  });

  doc.autoTable({
    startY: finalY + 5,
    head: [['Task', 'Assigned To', 'Status']],
    body: taskRows,
    headStyles: { fillColor: [236, 72, 153] },
    alternateRowStyles: { fillColor: [245, 245, 255] },
  });

  doc.save('TaskBlast-Weekly-Report.pdf');
}
  
  </script>
</body>
</html>
